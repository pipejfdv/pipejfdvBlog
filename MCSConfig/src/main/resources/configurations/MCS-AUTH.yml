server:
  port: ${AUTH_SERVER_PORT:9000}
spring:
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5433/auth_token_db}
    username: ${AUTH_DB_USERNAME:devpostgres}
    password: ${AUTH_DB_PASSWORD:devpass}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:dX3kRg9UznX3R8fCgekVYTNDpmk7w34tuepf5E/ZjT6Mtms+=8vSbwSX=e+/E1}
  expiration: ${JWT_EXPIRATION:86400000} # a day
  refresh-expiration:
    expiration: ${JWT_REFRESH_EXPIRATION:259200000} # 3 day

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}