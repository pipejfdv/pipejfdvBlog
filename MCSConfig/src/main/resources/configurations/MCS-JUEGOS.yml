server:
  port: ${JUEGOS_SERVER_PORT:8091}
spring:
  datasource:
    url: ${JUEGOS_DB_URL:jdbc:postgresql://localhost:5434/juegosdb}
    username: ${JUEGOS_DB_USERNAME:devpostgresJuegos}
    password: ${JUEGOS_DB_PASSWORD:devpass}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

logging:
  level:
    org.springframework.boot: DEBUG
    org.hibernate: DEBUG
    com.pipejfdv: DEBUG